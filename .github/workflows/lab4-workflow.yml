name: Publish Package to GitHub NPM Registry

on: 
  release: 
    types: [published]

    
jobs:
    npm-package:
      runs-on: ubuntu-latest
      # container:
      #   image: node:20
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup npm
          uses: actions/setup-node@v4
          with:
            node-version: 20.x
        - name: install npm
          run: npm install
